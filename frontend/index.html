<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Items App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
    header { background: #4f46e5; color: white; padding: 20px 40px; font-size: 1.5rem; font-weight: 700; }
    main { max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 28px; }
    h2 { margin-bottom: 16px; font-size: 1.1rem; color: #4f46e5; }
    input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; margin-bottom: 12px; outline: none; }
    input:focus, textarea:focus { border-color: #4f46e5; }
    textarea { height: 80px; resize: vertical; }
    button { background: #4f46e5; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; }
    button:hover { background: #3730a3; }
    #status { margin-top: 10px; font-size: 0.88rem; color: #16a34a; min-height: 18px; }
    #status.error { color: #dc2626; }
    .item-list { list-style: none; }
    .item-list li { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
    .item-list li:last-child { border-bottom: none; }
    .item-info .name { font-weight: 600; font-size: 1rem; }
    .item-info .desc { font-size: 0.85rem; color: #666; margin-top: 2px; }
    .item-info .date { font-size: 0.75rem; color: #aaa; margin-top: 4px; }
    .delete-btn { background: #fee2e2; color: #dc2626; padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; margin-left: 12px; }
    .delete-btn:hover { background: #fca5a5; }
  </style>
</head>
<body>

<header>📦 Items App</header>

<main>
  <div class="card">
    <h2>➕ Add New Item</h2>
    <input type="text" id="nameInput" placeholder="Item name (required)" />
    <textarea id="descInput" placeholder="Description (optional)"></textarea>
    <button onclick="addItem()">Add Item</button>
    <div id="status"></div>
  </div>

  <div class="card">
    <h2>📋 All Items</h2>
    <ul class="item-list" id="itemList">
      <li>Loading...</li>
    </ul>
  </div>
</main>

<script>
  const API = "https://digraphic-akilah-nonfluidly.ngrok-free.dev";

  async function fetchItems() {
    try {
      const res = await fetch(`${API}/items`);
      const items = await res.json();
      const list = document.getElementById("itemList");
      if (items.length === 0) {
        list.innerHTML = '<li>No items yet. Add one above!</li>';
        return;
      }
      list.innerHTML = items.map(item => `
        <li>
          <div class="item-info">
            <div class="name">${item.name}</div>
            ${item.description ? `<div class="desc">${item.description}</div>` : ""}
            <div class="date">${new Date(item.created_at).toLocaleString()}</div>
          </div>
          <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
        </li>
      `).join("");
    } catch (e) {
      document.getElementById("itemList").innerHTML =
        '<li style="color:red">⚠️ Cannot connect to backend. Is it running?</li>';
    }
  }

  async function addItem() {
    const name = document.getElementById("nameInput").value.trim();
    const description = document.getElementById("descInput").value.trim();
    const status = document.getElementById("status");
    if (!name) {
      status.textContent = "⚠️ Name is required!";
      status.className = "error";
      return;
    }
    try {
      const res = await fetch(`${API}/items`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, description })
      });
      if (res.ok) {
        document.getElementById("nameInput").value = "";
        document.getElementById("descInput").value = "";
        status.textContent = "✅ Item added!";
        status.className = "";
        fetchItems();
      }
    } catch (e) {
      status.textContent = "❌ Cannot connect to backend.";
      status.className = "error";
    }
  }

  async function deleteItem(id) {
    if (!confirm("Delete this item?")) return;
    await fetch(`${API}/items/${id}`, { method: "DELETE" });
    fetchItems();
  }

  fetchItems();
</script>
</body>
</html>
